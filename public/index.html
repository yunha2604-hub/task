<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모여라 동물의 숲 일상기록</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>모여라 동물의 숲 일상기록</h1>
            <p>오늘의 작은 순간을 귀엽고 밝게 기록해보세요. 사진과 텍스트를 함께 저장하고, 언제든지 미리보기를 확인할 수 있어요.</p>
        </header>

        <div class="grid">
            <section class="panel">
                <div class="section-title">
                    <h2 id="form-header">새 일기 작성하기</h2>
                    <span class="badge">귀여운 일상</span>
                </div>
                <form id="entry-form">
                    <div class="form-group">
                        <label for="entry-title">제목</label>
                        <input id="entry-title" type="text" placeholder="오늘은 어떤 하루였나요?">
                    </div>
                    <div class="form-group">
                        <label for="entry-date">날짜</label>
                        <input id="entry-date" type="date">
                    </div>
                    <div class="form-group">
                        <label for="entry-mood">오늘 기분</label>
                        <select id="entry-mood">
                            <option value="행복해요">행복해요</option>
                            <option value="기분 좋아요">기분 좋아요</option>
                            <option value="조금 피곤해요">조금 피곤해요</option>
                            <option value="편안해요">편안해요</option>
                            <option value="신나요">신나요</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="entry-text">일기 내용</label>
                        <textarea id="entry-text" placeholder="오늘 있었던 일을 자유롭게 적어보세요."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="entry-image">사진 추가</label>
                        <input id="entry-image" type="file" accept="image/*">
                        <button id="clear-image" type="button" class="secondary">이미지 제거</button>
                    </div>
                    <div class="form-group">
                        <label>미리보기 이미지</label>
                        <div id="image-preview" class="preview-card empty-state">
                            <span>여기에 업로드한 이미지가 표시됩니다.</span>
                        </div>
                    </div>
                    <div class="buttons">
                        <button id="submit-button" type="submit" class="primary">추가하기</button>
                        <button id="reset-button" type="button" class="secondary">새로운 일기</button>
                    </div>
                </form>
            </section>

            <section class="panel list-panel">
                <div class="section-title">
                    <h2>기록 목록</h2>
                    <span class="badge">저장된 일기</span>
                </div>
                <div class="list-search">
                    <input id="search-input" type="text" placeholder="제목, 내용, 기분으로 검색">
                </div>
                <div id="journal-list" class="list-items"></div>
            </section>
        </div>

        <section class="panel">
            <div class="section-title">
                <h2>선택한 일기 미리보기</h2>
                <span class="badge">따뜻한 추억</span>
            </div>
            <div id="entry-preview"></div>
        </section>
    </div>

    <div id="notification" class="notification" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
</body>
</html>
